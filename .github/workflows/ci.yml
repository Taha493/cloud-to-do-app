name: CI - Build & Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"

jobs:
  build-and-push:
    name: Build, Push, and Update K8s Manifests
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          persist-credentials: true

      # ── Set image tag from git SHA ────────────────────────────────────────────
      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      # ── Docker Hub login ──────────────────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Build & Push Backend ──────────────────────────────────────────────────
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/todo-backend:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/todo-backend:latest

      # ── Build & Push Frontend ─────────────────────────────────────────────────
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=http://${{ secrets.EC2_PUBLIC_IP }}:31000
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/todo-frontend:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/todo-frontend:latest

      # ── Update K8s manifests with new image tags ──────────────────────────────
      - name: Update backend deployment image tag
        run: |
          sed -i "s|image: ${{ secrets.DOCKERHUB_USERNAME }}/todo-backend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/todo-backend:${{ steps.tag.outputs.IMAGE_TAG }}|g" \
            k8s/backend/deployment.yaml

      - name: Update frontend deployment image tag
        run: |
          sed -i "s|image: ${{ secrets.DOCKERHUB_USERNAME }}/todo-frontend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/todo-frontend:${{ steps.tag.outputs.IMAGE_TAG }}|g" \
            k8s/frontend/deployment.yaml

      # ── Commit updated manifests (ArgoCD will detect this) ────────────────────
      - name: Commit and push updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/backend/deployment.yaml k8s/frontend/deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ steps.tag.outputs.IMAGE_TAG }} [skip ci]"
          git push
